version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: campeonato-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: campeonato
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: campeonato-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@campeonato.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data_dev:
